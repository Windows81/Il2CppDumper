name: build

on:
  push:
  workflow_dispatch: 
    
jobs:
  build:
    strategy:
      matrix:
        platform: [Net9]
        include:
          - platform: Net9
            package-name: Net9
            build-dir: net9.0-windows
            proj-name: Il2CppDumper.Winforms
            proj-file: Il2CppDumper.WinForms\Il2CppDumper.WinForms.csproj
            solution-name: Il2CppDumper.sln
            config: Release
            dotnet: 9.0.x

    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 0

    - name: Install .NET ${{matrix.dotnet}}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{matrix.dotnet}}

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2.0.0
    
    - name: Restore NuGet packages
      run: nuget restore ${{matrix.solution-name}}
      
    - name: Build app for release
      run: msbuild ${{matrix.proj-file}} -t:rebuild -p:Configuration=${{matrix.config}}
      
    - name: Create output directory
      run: New-Item -ItemType Directory -Path C:\builtfiles\${{matrix.proj-name}}-${{matrix.package-name}} -Force > $null
      continue-on-error: true
        
    - name: Copy release files for upload
      run: Copy-Item -Path ${{matrix.proj-name}}\bin\Release\${{matrix.build-dir}}\* -Destination C:\builtfiles\${{matrix.proj-name}}-${{matrix.package-name}} -Recurse

    - uses: actions/upload-artifact@v4.6.2
      with:
        name: ${{matrix.proj-name}} - ${{matrix.build-dir}}
        path: C:\builtfiles\${{matrix.proj-name}}-${{matrix.package-name}}
        if-no-files-found: error
        
    - name: Generate release data
      shell: bash
      run: |
        export LC_ALL=en_US.utf8
        GIT_COMMIT_ID=$(echo "${{ github.sha }}" |  cut -c 1-7)
        UPDATE_TIME=$(echo ${{ github.event.repository.updated_at }} | sed 's/[:-]//g')
        echo "tag_name=v${UPDATE_TIME}" >> $GITHUB_ENV
        echo "release_name=${UPDATE_TIME} (${GIT_COMMIT_ID})" >> $GITHUB_ENV
        
    - name: Release with notes
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ env.release_name }}
        tag_name: ${{ env.tag_name }}
        generate_release_notes: true
        overwrite_files: false
        files: C:\builtfiles\${{matrix.proj-name}}-${{matrix.package-name}}
